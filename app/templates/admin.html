<!DOCTYPE html>
<html>
<head>
    <title>Admin Dashboard</title>
</head>
<body>

<h1>Admin Dashboard</h1>

<h2>Users</h2>

<ul>
{% for user in users %}
<li>
{{ user.username }} - {{ user.email }}
</li>
{% endfor %}
</ul>

<h2>Posts</h2>

<ul>
{% for post in posts %}
<li>
{{ post.title }}
</li>
{% endfor %}
</ul>

</body>
</html>
