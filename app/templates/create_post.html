<!DOCTYPE html>
<html>
<head>
    <title>Create Post</title>
</head>
<body>

<h1>Create Blog Post</h1>

<form method="POST">

    {{ form.hidden_tag() }}

    <p>
        {{ form.title.label }}
        {{ form.title() }}
    </p>

    <p>
        {{ form.content.label }}
        {{ form.content() }}
    </p>

    <p>
        {{ form.submit() }}
    </p>

</form>

</body>
</html>
